name: Test ext

on: [push, pull_request]
jobs:
  test:
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository }}
    runs-on: ubuntu-latest
    env:
      RUST_BACKTRACE: 1
      RUSTFLAGS: "-D warnings"
      RUSTUP_TOOLCHAIN: ${{ matrix.toolchain }}

    strategy:
      matrix:
        toolchain: ["stable", "beta", "nightly"]

    continue-on-error: ${{ matrix.toolchain != 'stable' }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.9"
      - uses: extractions/setup-just@v4
        with:
          just-version: "1.54.0"

      - name: Install rustup
        id: rustup
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ matrix.toolchain }}

      - name: Cache files
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo
            /usr/share/rust/.cargo
            **/target
          key: test-${{ steps.rustup.outputs.rustc_hash }}-${{ hashFiles('**/Cargo.*') }}

      - name: Install testing requirements
        run: pip install pytest

      - name: Run ext tests
        run: cd ext && just test

      - name: Run ext examples
        run: cd ext && just benchmarks

      - name: Run ext examples (nassau)
        run: cd ext && just benchmarks-nassau

      - name: Run ext examples (concurrent)
        run: cd ext && just benchmarks-concurrent

      - name: Benchmark executable size
        run: |
          ls -l ext/target/debug/examples | grep -v ' .*-\|\.d$'

  miri:
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository }}
    runs-on: ubuntu-latest
    env:
      RUST_BACKTRACE: 1
      RUSTFLAGS: "-D warnings -A stable-features"
      RUSTUP_TOOLCHAIN: nightly

    steps:
      - uses: actions/checkout@v5
      - uses: extractions/setup-just@v4
        with:
          just-version: "1.54.0"

      - name: Install rustup
        id: rustup
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly
          components: miri

      - name: Cache files
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo
            /usr/share/rust/.cargo
            **/target
          key: miri-${{ steps.rustup.outputs.rustc_hash }}-${{ hashFiles('**/Cargo.*') }}

      - name: Run miri
        run: cd ext && just miri

  lint:
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository }}
    runs-on: ubuntu-latest
    env:
      RUST_BACKTRACE: 1
      RUSTFLAGS: "-D warnings"
      RUSTUP_TOOLCHAIN: nightly

    steps:
      - uses: actions/checkout@v5
      - uses: extractions/setup-just@v4
        with:
          just-version: "1.54.0"

      - name: Install rustup
        id: rustup
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly
          components: clippy, rustfmt

      - name: Install python dependencies
        run: sudo apt-get install black flake8

      - name: Cache files
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo
            /usr/share/rust/.cargo
            **/target
          key: lint-${{ steps.rustup.outputs.rustc_hash }}-${{ hashFiles('**/Cargo.*') }}

      - name: Run lint
        run: cd ext && just lint

      - name: Lint sseq_gui
        run: cd web_ext/sseq_gui && just lint

      - name: Lint sseq_gui tests
        run: cd web_ext/sseq_gui && just lint-selenium

  # Build the wasm webserver with the default `panic=abort` configuration on
  # stable/beta. This is the compatibility build; the deployed artifact is
  # produced by the `webserver-deploy` job below with `panic=unwind`.
  webserver:
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository }}
    runs-on: ubuntu-latest
    env:
      RUST_BACKTRACE: 1
      RUSTFLAGS: "-D warnings"
      RUSTUP_TOOLCHAIN: ${{ matrix.toolchain }}

    strategy:
      matrix:
        toolchain: ["stable", "beta"]

    continue-on-error: ${{ matrix.toolchain != 'stable' }}
    steps:
      - uses: actions/checkout@v5

      - uses: extractions/setup-just@v4
        with:
          just-version: "1.54.0"

      # `just test-wasm-js` runs the worker unit tests under Node's built-in
      # test runner. Pin Node 24 so CI doesn't drift with the runner default.
      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install rustup
        uses: dtolnay/rust-toolchain@v1
        id: rustup
        with:
          toolchain: ${{ matrix.toolchain }}
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - name: Cache files
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo
            /usr/share/rust/.cargo
            **/target
          key: wasm-${{ steps.rustup.outputs.rustc_hash }}-${{ hashFiles('**/Cargo.*') }}

      - name: Install wasm-opt
        run: sudo apt-get install binaryen

      - name: Setup build environment
        run: cd web_ext/sseq_gui && just setup-wasm

      - name: Lint sseq_gui wasm
        run: cd web_ext/sseq_gui && just lint-wasm

      - name: Test worker panic handling
        run: cd web_ext/sseq_gui && just test-wasm-js

      - name: Build wasm
        run: cd web_ext/sseq_gui && just wasm

      - name: Benchmark wasm size
        run: ls -l web_ext/sseq_gui/dist/sseq_gui_wasm_bg.wasm

      - name: Upload webserver
        uses: actions/upload-artifact@v6
        with:
          name: webserver-${{ matrix.toolchain }}
          path: web_ext/sseq_gui/dist/

  # Build the wasm webserver that actually gets deployed, on nightly with
  # `panic=unwind` (via WASM_UNWIND=1). This is deploy-critical, so unlike the
  # other nightly jobs it is not allowed to fail.
  webserver-deploy:
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository }}
    runs-on: ubuntu-latest
    env:
      RUST_BACKTRACE: 1
      RUSTFLAGS: "-D warnings"
      RUSTUP_TOOLCHAIN: nightly

    steps:
      - uses: actions/checkout@v5

      - uses: extractions/setup-just@v4
        with:
          just-version: "1.54.0"

      - name: Install rustup
        uses: dtolnay/rust-toolchain@v1
        id: rustup
        with:
          toolchain: nightly
          targets: wasm32-unknown-unknown
          # rust-src is required by `-Z build-std` (used by WASM_UNWIND=1).
          components: clippy, rustfmt, rust-src

      - name: Cache files
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo
            /usr/share/rust/.cargo
            **/target
          key: wasm-unwind-${{ steps.rustup.outputs.rustc_hash }}-${{ hashFiles('**/Cargo.*') }}

      - name: Install wasm-opt and wasm-objdump
        run: sudo apt-get install -y binaryen wabt

      - name: Setup build environment
        run: cd web_ext/sseq_gui && just setup-wasm

      - name: Build wasm (panic=unwind)
        run: cd web_ext/sseq_gui && just WASM_UNWIND=1 wasm

      - name: Verify wasm unwinding
        run: cd web_ext/sseq_gui && just test-wasm-unwind

      - name: Benchmark wasm size
        run: ls -l web_ext/sseq_gui/dist/sseq_gui_wasm_bg.wasm

      - name: Upload webserver
        uses: actions/upload-artifact@v6
        with:
          name: webserver-nightly
          path: web_ext/sseq_gui/dist/

  selenium:
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [webserver]
    env:
      RUST_BACKTRACE: 1
      RUSTFLAGS: "-D warnings"
      RUSTUP_TOOLCHAIN: ${{ matrix.toolchain }}

    strategy:
      matrix:
        toolchain: ["stable", "beta", "nightly"]

    defaults:
      run:
        working-directory: web_ext/sseq_gui


    continue-on-error: ${{ matrix.toolchain != 'stable' }}
    steps:
      - uses: actions/checkout@v5
      - uses: extractions/setup-just@v4
        with:
          just-version: "1.54.0"

      - name: Download webserver
        uses: actions/download-artifact@v7
        with:
          name: webserver-beta
          path: web_ext/sseq_gui/dist/

      - name: Install rustup
        uses: dtolnay/rust-toolchain@v1
        id: rustup
        with:
          toolchain: ${{ matrix.toolchain }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends python3-pytest python3-selenium python3-pip
          sudo apt-get install chromium-browser xvfb
          # Install Firefox from Mozilla (not snap) to avoid marionette issues
          wget -O- "https://download.mozilla.org/?product=firefox-latest&os=linux64&lang=en-US" | sudo tar -Jx -C /opt/
          sudo ln -sf /opt/firefox/firefox /usr/bin/firefox
          # Create necessary directories for Firefox
          mkdir -p $HOME/.mozilla $HOME/.cache
          pip install webdriver-manager

      - name: Cache files
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo
            /usr/share/rust/.cargo
            **/target
          key: webserver-${{ steps.rustup.outputs.rustc_hash }}-${{ hashFiles('**/Cargo.*') }}

      - name: Test wasm
        run: |
          just serve-wasm &
          (sleep 1 && xvfb-run -a -s "-screen 0 1280x720x24" just selenium)

      - name: Test local
        run: |
          cargo build &&
          (target/debug/sseq_gui &
          (sleep 1 && xvfb-run -a -s "-screen 0 1280x720x24" just selenium))

      - name: Test local concurrent
        run: |
          cargo build --features concurrent &&
          (target/debug/sseq_gui &
          (sleep 1 && xvfb-run -a -s "-screen 0 1280x720x24" just selenium))

      - name: Upload Artifact
        if: ${{ failure() }}
        uses: actions/upload-artifact@v6
        with:
          name: svg-changes-${{ matrix.toolchain }}
          path: web_ext/sseq_gui/tests/benchmarks/*-new.svg

  calculator:
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository }}
    runs-on: ubuntu-latest
    env:
      RUST_BACKTRACE: 1
      RUSTFLAGS: "-D warnings"
      RUSTUP_TOOLCHAIN: ${{ matrix.toolchain }}

    strategy:
      matrix:
        toolchain: ["stable", "beta", "nightly"]

    continue-on-error: ${{ matrix.toolchain != 'stable' }}
    steps:
      - uses: actions/checkout@v5
      - uses: extractions/setup-just@v4
        with:
          just-version: "1.54.0"

      - name: Install rustup
        id: rustup
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ matrix.toolchain }}
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - name: Cache files
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo
            /usr/share/rust/.cargo
            **/target
          key: calculator-${{ steps.rustup.outputs.rustc_hash }}-${{ hashFiles('**/Cargo.*') }}

      - name: Install wasm-opt
        run: sudo apt-get install binaryen

      - name: Setup build environment
        run: cd web_ext/steenrod_calculator && just setup-wasm

      - name: Lint calculator wasm
        run: cd web_ext/steenrod_calculator && just lint

      - name: Build wasm
        run: cd web_ext/steenrod_calculator && just all

      - name: Benchmark wasm size
        run: ls -l web_ext/steenrod_calculator/dist/steenrod_calculator_wasm_bg.wasm

      - name: Upload calculator
        uses: actions/upload-artifact@v6
        with:
          name: calculator-${{ matrix.toolchain }}
          path: web_ext/steenrod_calculator/dist/

  docs:
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository }}
    runs-on: ubuntu-latest
    env:
      RUST_BACKTRACE: 1
      RUSTFLAGS: "-D warnings"
      RUSTDOCFLAGS: "-D warnings"
      RUSTUP_TOOLCHAIN: ${{ matrix.toolchain }}

    strategy:
      matrix:
        toolchain: ["stable", "beta", "nightly"]

    continue-on-error: ${{ matrix.toolchain != 'stable' }}
    steps:
      - uses: actions/checkout@v5
      - uses: extractions/setup-just@v4
        with:
          just-version: "1.54.0"

      - name: Install rustup
        id: rustup
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ matrix.toolchain }}

      - name: Cache files
        if: ${{ matrix.toolchain != 'beta' }}
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo
            /usr/share/rust/.cargo
            **/target
          key: docs-${{ steps.rustup.outputs.rustc_hash }}-${{ hashFiles('ext/Cargo.*') }}

      - name: Generate docs
        run: cd ext && just docs

      - name: Upload docs
        uses: actions/upload-artifact@v6
        with:
          name: docs-${{ matrix.toolchain }}
          path: ext/target/doc/

  deploy:
    needs: [test, lint, webserver, webserver-deploy, calculator, docs, selenium]
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}

    steps:
      - name: Download webserver
        # Deploy the nightly build, which is compiled with panic=unwind.
        uses: actions/download-artifact@v7
        with:
          name: webserver-nightly

      - name: Download calculator
        uses: actions/download-artifact@v7
        with:
          name: calculator-stable
          path: calculator

      - name: Download docs
        uses: actions/download-artifact@v7
        with:
          name: docs-stable
          path: docs

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          full_commit_message: ${{ github.event.head_commit.message }}
